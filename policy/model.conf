[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[role_definition]
g = _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# obj is expected to be a normalized URL path. keyMatch2 allows patterns like:
#   /v1/nodes/:id
m = g(r.sub, p.sub) && keyMatch2(r.obj, p.obj) && r.act == p.act